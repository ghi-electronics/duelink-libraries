<script>
    import("./src/serialweb/serialweb.js").then(mod => serial = mod);
    import("./src/duelinkweb/duelink.js").then(mod => due = mod);

    // Get canvas context
    let canvas = document.getElementById("surface");

            document.getElementById("tab1Content").style.display = "none";
            document.getElementById("tab2Content").style.display = "none";
            document.getElementById("tab3Content").style.display = "none";
            document.getElementById("tab4Content").style.display = "none";

            document.getElementById("tab6Content").style.display = "none";
            //Show the Selected Tab
            document.getElementById("tab" + tabIndex + "Content").style.display =
                "block";
        }

    function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    function Check() {
        if (!this.duelink)
            this.duelink = new due.DUELinkController(new serial.WebSerial());
    }

    async function connect() {
        try {
            hideError();
            Check();
            await duelink.Connect();

            await getInfo(true);

            $("#id-version").text(duelink.Version);
            $("#id-connect").slideUp();
            $("#id-inputs").prop("disabled", false);

        } catch (e) {
            await getInfo(false);
            showError("connect Error" + e);

        }
    }

    async function toHex(number, length = 6) {
        let hexString = number.toString(16);
        while (hexString.length < length) {
            hexString = '0' + hexString;
        }
        return hexString;
    }

    async function getInfo(connected) {
        Check();

        let output = document.getElementById("devInfo");

        if (connected) {
            var dev_num = await toHex(await duelink.System.Info(0) / 1);
            var fw_num = (await duelink.System.Info(1) / 1.0).toString();



            var info = `Device ID: 0x${dev_num} - Firmware: ${fw_num}`
            output.innerHTML = info;
        }
        else {
            output.innerHTML = "";
        }
    }

    async function setLed() {
        Check();
        var val = $("#ledState").val() / 1;
        await duelink.Digital.Write(0, val);
    }

    async function setLedBlink() {
        Check();
        var high = $("#ledHigh").val() / 1;
        var low = $("#ledLow").val() / 1;
        var count = $("#ledCount").val() / 1;

        await duelink.System.StatLed(high, low, count);
    }


    async function digitalWrite() {
        Check();
        var pinDWrite = $("#pinNumberDigitalWrite").val() / 1;
        var valueDWrite = $("#valueDigitalWrite").val() / 1;
        await duelink.Digital.Write(pinDWrite, valueDWrite);
    }

    async function digitalRead() {
        Check();
        var pinDRead = $("#pinNumberDigitalRead").val() / 1;
        var pullDRead = $("#pullDigitalRead").val() / 1;
        var returnDigitalRead = await duelink.Digital.Read(pinDRead, pullDRead);

        console.log(returnDigitalRead)

        document.getElementById("digitalReadReturn").innerHTML = (returnDigitalRead.toString() === "true") ? "High" : "Low";
    }

    async function analoglWrite() {
        Check();
        var pinAWrite = $("#pinNumberAnalogWrite").val() / 1;
        let rangeslider = document.getElementById("sliderRange");
        let output = document.getElementById("demo");
        output.innerHTML = rangeslider.value;

        rangeslider.oninput = function () {
            output.innerHTML = this.value;
        }
        var valueRange = rangeslider.value;
        var aValue = (valueRange / 1) / 255.0;
        await duelink.Analog.PWrite(pinAWrite, aValue);
    }

    async function setServo() {
        Check();
        var pinServo = $("#pinNumberServo").val() / 1;
        var valueSelectedServo = $("#valueServo").val();
        let rangesliderServo = document.getElementById("sliderRangeServo");
        let output2 = document.getElementById("demoServo");
        output2.innerHTML = rangesliderServo.value + ' degrees';

        rangesliderServo.oninput = function () {
            output2.innerHTML = this.value + ' degrees';
        }
        var valueRangeServo = rangesliderServo.value;
        var servoValue = valueRangeServo / 1;
        await duelink.Servo.Set(pinServo, servoValue);
    }

    async function analoglRead() {
        Check();
        var pinRead = $("#pinNumberAnalogRead").val() / 1;
        var returnAnalogRead = await duelink.Analog.VRead(pinRead);
        document.getElementById("analogReadReturn").innerHTML = returnAnalogRead + "V";
    }



    async function playSound() {
        Check();
        var pinSound = $("#pinNumberSound").val() / 1;
        var noteSoundValue = $("#playNote").val() / 1;

        await duelink.Sound.Beep(pinSound, noteSoundValue, 500);				
			
        
    }

    async function sendImage() {
        Check();
        let frameBuffer = ctx.getImageData(0, 0, canvas.width, canvas.height);
        await duelink.Display.ShowBuffer(frameBuffer.data, color_depth);
    }

    async function sendClear() {
        await duelink.Graphics.Clear(0);
        await duelink.Graphics.Show();
    }

    async function sendLine() {
        var x1 = $("#linePosX1").val() / 1
        var y1 = $("#linePosY1").val() / 1

        var x2 = $("#linePosX2").val() / 1
        var y2 = $("#linePosY2").val() / 1

        var r = $("#colorRed").val() / 1
        var g = $("#colorGreen").val() / 1
        var b = $("#colorBlue").val() / 1

        var c = (r << 16) | (g << 8) | (b << 0)

        await duelink.Graphics.Line(c, x1, y1, x2, y2)
        await duelink.Graphics.Show()
    }

    async function sendCircle() {



        var x = $("#circlePosX").val() / 1
        var y = $("#circlePosY").val() / 1
        var rd = $("#circleRadius").val() / 1

        var r = $("#colorRed").val() / 1
        var g = $("#colorGreen").val() / 1
        var b = $("#colorBlue").val() / 1

        var c = (r << 16) | (g << 8) | (b << 0)

        await duelink.Graphics.Circle(c, x, y, rd)
        await duelink.Graphics.Show()
    }

    async function sendText() {
        Check();
        var x = $("#textPosX").val() / 1
        var y = $("#textPosY").val() / 1

        var r = $("#colorRed").val() / 1
        var g = $("#colorGreen").val() / 1
        var b = $("#colorBlue").val() / 1

        var c = (r << 16) | (g << 8) | (b << 0)

        var msg = $("#textsendid").val()

        await duelink.Graphics.TextT(msg, c, x, y)
        await duelink.Graphics.Show()

            
    }

    function hideError() {
        $("#id-error").hide();
    }

    function showStatus(message) {
        $("#id-inputs").prop("disabled", true);
        hideError();
        $("#id-status").show();
        $("#status-message").text(message);
        $.when($("#id-status").fadeOut(1000)).done(
            function () { $("#id-inputs").prop("disabled", false); }
        );
    }

    function showError(message) {
        $("#id-inputs").prop("disabled", true);
        $("#id-error").show();
        $("#error-message").text(message);
    }
</script>
