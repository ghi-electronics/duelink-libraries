    async function toHex(number, length = 6) {
        let hexString = number.toString(16);
        while (hexString.length < length) {
            hexString = '0' + hexString;
        }
        return hexString;
    }

    function NormalizeVersion(versionString) {

        if (!versionString) return "";

        // Remove leading 'v' or 'V'
        let v = versionString.trim().replace(/^v/i, "");

        // Extract only numeric version (e.g., 0.77 or 1.2.3)
        const match = v.match(/^\d+(\.\d+)+/);

        return match ? match[0] : v;
    }

    async function IsLatestFirmware(deviceFirmware) {

        try {
            const response = await fetch("https://www.duelink.com/duelink-fw.json");

            if (!response.ok) {
                throw new Error("Failed to fetch firmware data");
            }

            const data = await response.json();

            // Safety check
            if (!data.DUELink || !Array.isArray(data.DUELink.versions)) {
                throw new Error("Invalid firmware JSON structure");
            }

            const versions = data.DUELink.versions;

            // Find version with highest id
            const latest = versions.reduce((max, current) =>
                current.id > max.id ? current : max
            );

            // Compare firmware string
            // Normalize both versions before compare
            const latestVersion = NormalizeVersion(latest.name);
            const deviceVersion = NormalizeVersion(deviceFirmware);

            return deviceVersion === latestVersion;

        } catch (error) {
            console.error("Firmware check error:", error);
            return false; // safest fallback
        }
    }

    let dl_json_data = null;
    async function loadDLJson() {
        if (dl_json_data == null) {
            //const response = await fetch('https://www.duelink.com/duelink.json');
            const response = await fetch('https://raw.githubusercontent.com/ghi-electronics/duelink-website/refs/heads/dev/static/duelink.json');

            const json = await response.json();

            // Ensure products array exists
            dl_json_data = Array.isArray(json.products) ? json.products : [];
        }
    }

    function getDeviceByPID(pid) {
        if (dl_json_data == null)
            return "NA";

        // Convert pid to uppercase for case‑insensitive match
        const pidStr = String(pid).toUpperCase();

        const item = dl_json_data.find(d => String(d.PID).toUpperCase() === pidStr);

        if (!item) return "NA";

        return {
            name: item.name ?? "NA",
            partNumber: item.partNumber ?? "NA"
        };
    }

    async function DoSendCommand() {
        if (!isConnected) {
            alert("Device not connected!");
            return
        }

        Check();


        // Get textbox value
        const cmd = document.getElementById("cmdInput").value;

        document.getElementById("cmdResponse").value = `Sending...${cmd}`;

        var ret = await duelink.Engine.ExecuteCommandRaw(cmd)

        document.getElementById("cmdInput").value = "";

        if (ret != "")
            document.getElementById("cmdResponse").value = `Sent: ${cmd}\nResponse: ${ret}`;
        else
            document.getElementById("cmdResponse").value = `Sent: ${cmd}\nResponse: None!`;

        //document.getElementById("cmdResponse").value = ret;

    }
